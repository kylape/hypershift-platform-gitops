---
# ArgoCD ApplicationSet: Deploy AWS EC2-based HyperShift hosted clusters
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hypershift-clusters-aws
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - git:
        repoURL: https://github.com/kylape/hypershift-platform-gitops.git
        revision: main
        files:
          - path: "clusters/configs/aws/*.yaml"

  template:
    metadata:
      name: 'cluster-aws-{{.name}}'
      namespace: openshift-gitops
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    spec:
      project: hypershift-platform
      source:
        repoURL: https://github.com/kylape/hypershift-platform-gitops.git
        targetRevision: main
        path: 'clusters/base/aws'
        kustomize:
          patches:
            # PreSync Job patches - substitutes cluster-specific values
            - target:
                kind: Job
                name: create-aws-cluster-CLUSTER_NAME
              patch: |-
                - op: replace
                  path: /metadata/name
                  value: "create-aws-cluster-aws-{{.name}}"
                - op: replace
                  path: /spec/template/spec/containers/0/env/0/value
                  value: "aws-{{.name}}"
                - op: replace
                  path: /spec/template/spec/containers/0/env/1/value
                  value: "{{ default "m5.xlarge" .instanceType }}"
                - op: replace
                  path: /spec/template/spec/containers/0/env/2/value
                  value: "{{ default 2 .replicas }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: clusters
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
