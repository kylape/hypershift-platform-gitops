---
# ArgoCD ApplicationSet: Deploy HyperShift hosted clusters from config files
#
# This ApplicationSet uses the Git file generator to automatically create
# an Application for each cluster config file in clusters/configs/.
#
# Supported platform types:
#   - kubevirt (default): KubeVirt-based hosted cluster workers (VMs on bare metal)
#   - aws: EC2-based hosted cluster workers
#
# To add a new cluster:
#   1. Create clusters/configs/<cluster-name>.yaml with cluster configuration
#   2. Commit and push - ArgoCD will automatically create the cluster
#
# To remove a cluster:
#   1. Delete clusters/configs/<cluster-name>.yaml
#   2. Commit and push - ArgoCD will automatically delete the cluster resources
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hypershift-clusters
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # Git file generator - reads YAML files from clusters/configs/
    - git:
        repoURL: https://github.com/kylape/hypershift-platform-gitops.git
        revision: main
        files:
          - path: "clusters/configs/*.yaml"

  template:
    metadata:
      name: 'cluster-{{.name}}'
      namespace: openshift-gitops
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    spec:
      project: hypershift-platform
      source:
        repoURL: https://github.com/kylape/hypershift-platform-gitops.git
        targetRevision: main
        # Select base directory based on platformType (default: kubevirt)
        path: 'clusters/base/{{ .platformType | default "kubevirt" }}'
        kustomize:
          # Use Kustomize patches to substitute values from config into templates
          patches:
            # HostedCluster patches - common for all platforms
            - target:
                kind: HostedCluster
                name: CLUSTER_NAME
              patch: |-
                - op: replace
                  path: /metadata/name
                  value: "{{.name}}"
                {{- if .labels }}
                - op: add
                  path: /metadata/labels
                  value:
                    {{- range $key, $value := .labels }}
                    {{ $key }}: "{{ $value }}"
                    {{- end }}
                {{- end }}

            # NodePool patches - common fields
            - target:
                kind: NodePool
                name: CLUSTER_NAME-workers
              patch: |-
                - op: replace
                  path: /metadata/name
                  value: "{{.name}}-workers"
                - op: replace
                  path: /spec/clusterName
                  value: "{{.name}}"
                - op: replace
                  path: /spec/replicas
                  value: {{ .replicas | default 2 }}
                - op: replace
                  path: /spec/arch
                  value: "{{ .arch | default "amd64" }}"

            # KubeVirt-specific NodePool patches
            {{- if or (not .platformType) (eq .platformType "kubevirt") }}
            - target:
                kind: NodePool
                name: CLUSTER_NAME-workers
              patch: |-
                - op: replace
                  path: /metadata/annotations/hypershift.openshift.io~1kubevirt-vm-jsonpatch
                  value: |
                    [
                      {"op": "add", "path": "/spec/architecture", "value": "{{ .arch | default "amd64" }}"},
                      {"op": "add", "path": "/spec/template/spec/architecture", "value": "{{ .arch | default "amd64" }}"},
                      {"op": "add", "path": "/spec/template/spec/domain/machine", "value": {"type": "q35"}},
                      {"op": "add", "path": "/spec/template/spec/domain/firmware", "value": {"bootloader": {"efi": {"secureBoot": false}}}},
                      {"op": "add", "path": "/spec/template/spec/domain/features", "value": {"smm": {"enabled": false}}}
                    ]
                - op: replace
                  path: /spec/platform/kubevirt/compute/cores
                  value: {{ .cores | default 8 }}
                - op: replace
                  path: /spec/platform/kubevirt/compute/memory
                  value: "{{ .memory | default "32Gi" }}"
                - op: replace
                  path: /spec/platform/kubevirt/rootVolume/persistent/size
                  value: "{{ .storageSize | default "100Gi" }}"
                - op: replace
                  path: /spec/platform/kubevirt/rootVolume/persistent/storageClass
                  value: "{{ .storageClass | default "gp3-csi" }}"
                - op: replace
                  path: /spec/platform/kubevirt/nodeSelector
                  value:
                    kubernetes.io/arch: "{{ .arch | default "amd64" }}"
            {{- end }}

            # AWS-specific HostedCluster patches
            {{- if eq .platformType "aws" }}
            - target:
                kind: HostedCluster
                name: CLUSTER_NAME
              patch: |-
                - op: replace
                  path: /spec/platform/aws/rolesRef/ingressARN
                  value: "{{ .ingressARN }}"
                - op: replace
                  path: /spec/platform/aws/rolesRef/imageRegistryARN
                  value: "{{ .imageRegistryARN }}"
                - op: replace
                  path: /spec/platform/aws/rolesRef/storageARN
                  value: "{{ .storageARN }}"
                - op: replace
                  path: /spec/platform/aws/rolesRef/networkARN
                  value: "{{ .networkARN }}"
                - op: replace
                  path: /spec/platform/aws/rolesRef/kubeCloudControllerARN
                  value: "{{ .kubeCloudControllerARN }}"
                - op: replace
                  path: /spec/platform/aws/rolesRef/nodePoolManagementARN
                  value: "{{ .nodePoolManagementARN }}"
                - op: replace
                  path: /spec/platform/aws/rolesRef/controlPlaneOperatorARN
                  value: "{{ .controlPlaneOperatorARN }}"
            {{- end }}

            # AWS-specific NodePool patches
            {{- if eq .platformType "aws" }}
            - target:
                kind: NodePool
                name: CLUSTER_NAME-workers
              patch: |-
                - op: replace
                  path: /spec/platform/aws/instanceType
                  value: "{{ .instanceType | default "m5.xlarge" }}"
                - op: replace
                  path: /spec/platform/aws/instanceProfile
                  value: "{{ .instanceProfile }}"
                - op: replace
                  path: /spec/platform/aws/rootVolume/size
                  value: {{ .rootVolumeSize | default 120 }}
                - op: replace
                  path: /spec/platform/aws/subnet/id
                  value: "{{ .subnetId }}"
                - op: replace
                  path: /spec/platform/aws/securityGroups/0/id
                  value: "{{ .securityGroupId }}"
            {{- end }}

      destination:
        server: https://kubernetes.default.svc
        namespace: clusters
      ignoreDifferences:
        # KubeVirt-specific fields
        - group: hypershift.openshift.io
          kind: HostedCluster
          jsonPointers:
            - /spec/platform/kubevirt/generateID
        # AWS-specific fields that may be populated by the operator
        - group: hypershift.openshift.io
          kind: HostedCluster
          jsonPointers:
            - /spec/platform/aws/resourceTags
            - /spec/infraID
        - group: hypershift.openshift.io
          kind: NodePool
          jsonPointers:
            - /spec/platform/aws/ami
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
