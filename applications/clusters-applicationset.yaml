---
# ArgoCD ApplicationSet: Deploy HyperShift hosted clusters from config files
#
# This ApplicationSet uses the Git file generator to automatically create
# an Application for each cluster config file in clusters/configs/.
#
# Supported platform types:
#   - kubevirt (default): KubeVirt-based hosted cluster workers (VMs on bare metal)
#   - aws: EC2-based hosted cluster workers (future)
#
# To add a new cluster:
#   1. Create clusters/configs/<cluster-name>.yaml with cluster configuration
#   2. Commit and push - ArgoCD will automatically create the cluster
#
# To remove a cluster:
#   1. Delete clusters/configs/<cluster-name>.yaml
#   2. Commit and push - ArgoCD will automatically delete the cluster resources
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hypershift-clusters
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    # Git file generator - reads YAML files from clusters/configs/
    - git:
        repoURL: https://github.com/kylape/hypershift-platform-gitops.git
        revision: main
        files:
          - path: "clusters/configs/*.yaml"

  template:
    metadata:
      name: 'cluster-{{.name}}'
      namespace: openshift-gitops
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    spec:
      project: hypershift-platform
      source:
        repoURL: https://github.com/kylape/hypershift-platform-gitops.git
        targetRevision: main
        # Select base directory based on platformType (default: kubevirt)
        path: 'clusters/base/{{ default "kubevirt" .platformType }}'
        kustomize:
          # Use Kustomize patches to substitute values from config into templates
          patches:
            # HostedCluster patches
            - target:
                kind: HostedCluster
                name: CLUSTER_NAME
              patch: |-
                - op: replace
                  path: /metadata/name
                  value: "{{.name}}"
                {{- if .labels }}
                - op: add
                  path: /metadata/labels
                  value:
                    {{- range $key, $value := .labels }}
                    {{ $key }}: "{{ $value }}"
                    {{- end }}
                {{- end }}
            # NodePool patches
            - target:
                kind: NodePool
                name: CLUSTER_NAME-workers
              patch: |-
                - op: replace
                  path: /metadata/name
                  value: "{{.name}}-workers"
                - op: replace
                  path: /metadata/annotations/hypershift.openshift.io~1kubevirt-vm-jsonpatch
                  value: |
                    [
                      {"op": "add", "path": "/spec/architecture", "value": "{{ default "amd64" .arch }}"},
                      {"op": "add", "path": "/spec/template/spec/architecture", "value": "{{ default "amd64" .arch }}"},
                      {"op": "add", "path": "/spec/template/spec/domain/machine", "value": {"type": "q35"}},
                      {"op": "add", "path": "/spec/template/spec/domain/firmware", "value": {"bootloader": {"efi": {"secureBoot": false}}}},
                      {"op": "add", "path": "/spec/template/spec/domain/features", "value": {"smm": {"enabled": false}}},
                      {"op": "add", "path": "/spec/template/spec/tolerations", "value": [{"key": "workload-type", "operator": "Equal", "value": "kubevirt-vm", "effect": "NoSchedule"}]}
                    ]
                - op: replace
                  path: /spec/clusterName
                  value: "{{.name}}"
                - op: replace
                  path: /spec/replicas
                  value: {{ default 2 .replicas }}
                - op: replace
                  path: /spec/arch
                  value: "{{ default "amd64" .arch }}"
                - op: replace
                  path: /spec/platform/kubevirt/compute/cores
                  value: {{ default 8 .cores }}
                - op: replace
                  path: /spec/platform/kubevirt/compute/memory
                  value: "{{ default "32Gi" .memory }}"
                - op: replace
                  path: /spec/platform/kubevirt/rootVolume/persistent/size
                  value: "{{ default "100Gi" .storageSize }}"
                - op: replace
                  path: /spec/platform/kubevirt/rootVolume/persistent/storageClass
                  value: "{{ default "gp3-csi" .storageClass }}"
                - op: replace
                  path: /spec/platform/kubevirt/nodeSelector
                  value:
                    kubernetes.io/arch: "{{ default "amd64" .arch }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: clusters
      ignoreDifferences:
        - group: hypershift.openshift.io
          kind: HostedCluster
          jsonPointers:
            - /spec/platform/kubevirt/generateID
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
