apiVersion: hypershift.openshift.io/v1beta1
kind: NodePool
metadata:
  name: CLUSTER_NAME-workers
  namespace: clusters
spec:
  clusterName: CLUSTER_NAME
  replicas: 2
  arch: amd64
  management:
    autoRepair: true
    replace:
      strategy: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 1
    upgradeType: Replace
  release:
    image: quay.io/openshift-release-dev/ocp-release:4.18.30-multi
  platform:
    type: AWS
    aws:
      instanceType: INSTANCE_TYPE
      instanceProfile: INSTANCE_PROFILE
      rootVolume:
        size: 120
        type: gp3
      subnet:
        id: SUBNET_ID
      securityGroups:
        - id: SECURITY_GROUP_ID
