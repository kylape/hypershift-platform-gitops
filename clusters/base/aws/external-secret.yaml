apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hypershift-aws-config
  namespace: clusters
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: hypershift-aws-config
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: hypershift/aws-config
