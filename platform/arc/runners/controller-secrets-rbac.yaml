---
# Grant the ARC controller permissions in the arc-runners namespace
# - Secrets: access GitHub App credentials (arc-github-app-*)
# - Roles/RoleBindings: manage listener pod RBAC for ephemeral runners
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arc-controller-secrets
  namespace: arc-runners
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["create", "delete", "get", "list", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arc-controller-secrets
  namespace: arc-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arc-controller-secrets
subjects:
- kind: ServiceAccount
  name: arc-controller-gha-rs-controller
  namespace: arc-systems
