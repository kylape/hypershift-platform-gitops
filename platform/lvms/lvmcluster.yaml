apiVersion: lvm.topolvm.io/v1alpha1
kind: LVMCluster
metadata:
  name: nvme-lvmcluster
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  storage:
    deviceClasses:
      - name: nvme
        default: true
        fstype: xfs
        nodeSelector:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node.kubernetes.io/instance-type
                  operator: In
                  values:
                    # Bare metal nodes
                    - m7gd.metal
                    - c6id.metal
                    # General NVMe nodes (amd64)
                    - m5d.xlarge
                    - m5d.2xlarge
                    - m5d.4xlarge
                    - m6id.xlarge
                    - m6id.2xlarge
                    # General NVMe nodes (arm64)
                    - m6gd.xlarge
                    - m6gd.2xlarge
                    - m7gd.xlarge
                    - m7gd.2xlarge
        deviceSelector:
          forceWipeDevicesAndDestroyAllData: true
          optionalPaths:
            - /dev/nvme0n1
            - /dev/nvme1n1
        thinPoolConfig:
          name: thin-pool-nvme
          overprovisionRatio: 10
          sizePercent: 90
